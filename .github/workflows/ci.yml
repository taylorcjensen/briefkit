name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: npm run check

      - name: Production audit
        run: npm audit --omit=dev --audit-level=high

      - name: Self-build smoke
        run: |
          out_dir="$(mktemp -d)/briefkit-dist"
          npm run briefkit -- build . --out "$out_dir" --color-mode auto
          test -f "$out_dir/index.html"

      - name: Pack dry run
        run: npm pack --dry-run
